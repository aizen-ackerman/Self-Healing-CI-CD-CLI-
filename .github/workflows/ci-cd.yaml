name: ci-cd

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-test-publish:
    if: github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/self-healing-cicd
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Validate Docker Hub secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || { echo "Missing DOCKERHUB_USERNAME"; exit 1; }
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || { echo "Missing DOCKERHUB_TOKEN"; exit 1; }

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Update Kubernetes manifest for GitOps
        run: |
          sed -i "s|^[[:space:]]*image:.*|          image: docker.io/${IMAGE_NAME}:${GITHUB_SHA}|" k8s/deployment.yaml
          sed -i "s|value: \".*\"|value: \"${GITHUB_SHA}\"|" k8s/deployment.yaml

      - name: Commit manifest update
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "Update deployment image to ${GITHUB_SHA} [skip ci]"
          git push
